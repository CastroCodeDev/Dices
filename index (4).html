<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Dice</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0404; --surface: #1a0808; --surface2: #200a0a;
  --border: #3d1010; --border2: #5a1515;
  --red: #cc2200; --red2: #e63300; --red3: #ff4400;
  --red-glow: rgba(204,34,0,0.3); --red-soft: rgba(204,34,0,0.08);
  --gold: #c8960a; --gold2: #e8b020; --gold-soft: rgba(200,150,10,0.12);
  --text: #f5e6d8; --text2: #a07060; --text3: #5a3020; --ember: #ff6622;
}
body { font-family:'Crimson Pro',serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 80% 50% at 50% -10%,rgba(204,34,0,.12) 0%,transparent 60%), radial-gradient(ellipse 60% 40% at 50% 110%,rgba(180,20,0,.08) 0%,transparent 60%); pointer-events:none; z-index:0; }
.dragon-bg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:min(700px,95vw); opacity:.032; pointer-events:none; z-index:0; }
.corner { position:fixed; width:80px; height:80px; opacity:.18; pointer-events:none; z-index:1; }
.corner-tl{top:12px;left:12px} .corner-tr{top:12px;right:12px;transform:scaleX(-1)} .corner-bl{bottom:12px;left:12px;transform:scaleY(-1)} .corner-br{bottom:12px;right:12px;transform:scale(-1,-1)}
@media(max-width:600px){.corner{display:none}}

header { position:relative; z-index:10; text-align:center; padding:40px 20px 20px; border-bottom:1px solid var(--border); }
.header-ornament { font-size:11px; letter-spacing:.4em; color:var(--red2); text-transform:uppercase; font-family:'Cinzel',serif; margin-bottom:10px; opacity:.7; }
h1 { font-family:'Cinzel',serif; font-weight:900; font-size:clamp(32px,7vw,64px); letter-spacing:.05em; line-height:1; text-shadow:0 0 60px rgba(204,34,0,.4),0 2px 4px rgba(0,0,0,.8); }
h1 span{color:var(--red3)}
.header-line { width:200px; height:1px; background:linear-gradient(90deg,transparent,var(--red2),var(--gold),var(--red2),transparent); margin:16px auto 0; }
.watermark { margin-top:10px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:.25em; color:var(--text3); text-transform:uppercase; opacity:.6; }

main { position:relative; z-index:10; max-width:900px; margin:0 auto; padding:28px 20px 60px; }
.section-title { font-family:'Cinzel',serif; font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--text3); margin-bottom:14px; display:flex; align-items:center; gap:12px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.dice-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:10px; margin-bottom:28px; }
.dice-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 6px; cursor:pointer; transition:all .18s; display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--text2); font-family:'Cinzel',serif; }
.dice-btn:hover { border-color:var(--red2); background:var(--surface2); color:var(--text); transform:translateY(-2px); box-shadow:0 4px 20px var(--red-glow); }
.dice-btn.selected { border-color:var(--red3); background:var(--red-soft); color:var(--red3); box-shadow:0 0 16px var(--red-glow); }
.dice-icon{width:36px;height:36px}
.dice-label{font-size:11px;font-weight:600;letter-spacing:.05em}

.config-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:20px; }
@media(max-width:500px){.config-row{grid-template-columns:1fr 1fr}}
.config-group{display:flex;flex-direction:column;gap:6px}
.config-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--text3); }
.config-input { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-family:'Crimson Pro',serif; font-size:18px; color:var(--text); outline:none; transition:border-color .15s; width:100%; text-align:center; }
.config-input:focus{border-color:var(--red2);box-shadow:0 0 12px var(--red-glow)}

.mode-row{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.mode-btn { flex:1; min-width:140px; font-family:'Cinzel',serif; font-size:12px; letter-spacing:.1em; text-transform:uppercase; padding:12px 16px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; transition:all .15s; display:flex; flex-direction:column; align-items:center; gap:4px; }
.mode-btn:hover{border-color:var(--border2);color:var(--text)}
.mode-btn.active{border-color:var(--red3);background:var(--red-soft);color:var(--red3);box-shadow:0 0 14px var(--red-glow)}
.mode-desc{font-family:'Crimson Pro',serif;font-size:11px;font-style:italic;opacity:.6;text-transform:none;letter-spacing:0}

.roll-wrap{display:flex;justify-content:center;margin-bottom:32px}
.roll-btn { font-family:'Cinzel',serif; font-size:16px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--text); background:linear-gradient(135deg,#8b0000,var(--red),#8b0000); border:1px solid var(--red2); border-radius:12px; padding:16px 48px; cursor:pointer; transition:all .2s; box-shadow:0 4px 30px rgba(204,34,0,.4),inset 0 1px 0 rgba(255,100,50,.3); position:relative; overflow:hidden; }
.roll-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,100,50,.15) 100%)}
.roll-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 40px rgba(204,34,0,.6)}
.roll-btn:active{transform:scale(.97)}
.roll-btn.rolling{animation:btnPulse .12s ease infinite alternate;pointer-events:none}
@keyframes btnPulse{from{box-shadow:0 4px 20px rgba(204,34,0,.5)}to{box-shadow:0 8px 50px rgba(255,80,0,.9)}}

/* ── DICE ANIMATION STAGE ── */
.dice-stage { display:flex; justify-content:center; flex-wrap:wrap; gap:14px; margin-bottom:20px; min-height:90px; align-items:center; }

.die-anim {
  position: relative;
  width: 70px; height: 70px;
  display: flex; align-items: center; justify-content: center;
}

.die-anim svg.die-shape {
  position: absolute;
  width: 100%; height: 100%;
  transition: filter .3s;
}

.die-anim .die-value {
  position: relative;
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--red3);
  text-shadow: 0 0 10px var(--red3);
  z-index: 2;
  line-height: 1;
  user-select: none;
}

/* spinning animation */
.die-anim.spinning {
  animation: dieSpin 0.4s linear infinite;
}
@keyframes dieSpin {
  0%   { transform: rotate(0deg) scale(1); }
  25%  { transform: rotate(90deg) scale(1.1); }
  50%  { transform: rotate(180deg) scale(1); }
  75%  { transform: rotate(270deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}

/* landing bounce */
.die-anim.landing {
  animation: dieLand 0.5s cubic-bezier(.25,.46,.45,.94) both;
}
@keyframes dieLand {
  0%   { transform: rotate(720deg) scale(1.3); opacity:0; }
  60%  { transform: rotate(0deg) scale(1.08); opacity:1; }
  80%  { transform: scale(.95); }
  100% { transform: scale(1); }
}

.die-anim.winner .die-value { color:var(--gold2); text-shadow:0 0 16px var(--gold2); }
.die-anim.winner svg.die-shape { filter: drop-shadow(0 0 8px var(--gold2)); }
.die-anim.loser { opacity:.35; }
.die-anim.maxroll .die-value { color:var(--gold2); text-shadow:0 0 14px var(--gold2); }
.die-anim.maxroll svg.die-shape { filter: drop-shadow(0 0 8px var(--gold2)); }
.die-anim.minroll .die-value { color:var(--text3); text-shadow:none; }

.result-area{margin-bottom:32px;display:none}
.result-area.show{display:block}
.result-card { background:var(--surface); border:1px solid var(--border2); border-radius:14px; padding:28px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 0 40px rgba(204,34,0,.1),inset 0 1px 0 rgba(255,100,50,.1); }
.result-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--red2),var(--gold),var(--red2),transparent)}
.result-formula{font-family:'Cinzel',serif;font-size:13px;color:var(--text3);letter-spacing:.1em;margin-bottom:8px}
.result-breakdown{font-family:'Crimson Pro',serif;font-size:16px;color:var(--text2);margin-bottom:14px;min-height:24px}
.result-total{font-family:'Cinzel',serif;font-size:clamp(48px,12vw,88px);font-weight:900;color:var(--text);line-height:1;text-shadow:0 0 40px rgba(204,34,0,.5),0 0 80px rgba(204,34,0,.2);transition:all .3s}
.result-total.critical{color:var(--gold2);text-shadow:0 0 40px rgba(200,150,10,.7),0 0 80px rgba(200,150,10,.3);animation:critGlow 1.5s ease-in-out infinite alternate}
.result-total.fumble{color:var(--text3);text-shadow:none}
@keyframes critGlow{from{text-shadow:0 0 30px rgba(200,150,10,.6)}to{text-shadow:0 0 60px rgba(255,180,0,.9),0 0 100px rgba(200,150,10,.4)}}
.result-label{margin-top:8px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.3em;text-transform:uppercase}
.label-crit{color:var(--gold2)} .label-fumble{color:var(--text3)} .label-normal{color:var(--text3)}

.embers{position:fixed;inset:0;pointer-events:none;z-index:200}
.ember{position:absolute;border-radius:50%;background:var(--ember);box-shadow:0 0 6px var(--red3);animation:emberFloat linear forwards}
@keyframes emberFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-300px) scale(0);opacity:0}}

.hist-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:all .12s}
.hist-item:hover{border-color:var(--border2);background:var(--surface2)}
.hist-formula{font-family:'Cinzel',serif;font-size:12px;color:var(--text2)}
.hist-rolls{font-family:'Crimson Pro',serif;font-size:13px;color:var(--text3);flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-total{font-family:'Cinzel',serif;font-size:18px;font-weight:700;min-width:40px;text-align:right}
.hist-total.crit{color:var(--gold2)} .hist-total.fumble{color:var(--text3)} .hist-total.normal{color:var(--red3)}
.hist-empty{text-align:center;padding:20px;color:var(--text3);font-style:italic;font-size:14px}
</style>
</head>
<body>

<svg class="dragon-bg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" fill="#cc2200">
  <path d="M250,60 C200,60 160,80 140,110 C120,140 115,170 130,195 C100,185 75,165 65,140 C55,115 65,85 90,70 C70,75 52,95 50,120 C48,148 65,175 92,190 C75,198 55,195 42,182 C35,175 32,165 35,155 C25,168 25,185 35,198 C50,215 75,220 100,212 C88,230 88,252 100,268 C115,288 140,295 162,288 C148,305 148,328 162,342 C178,358 202,362 222,352 C215,372 220,395 235,408 C252,423 275,424 290,412 C295,430 305,444 320,450 C338,458 358,452 368,438 C368,455 375,470 388,476 C402,482 418,476 424,462 C430,475 442,484 456,483 C465,482 472,476 474,468 C468,472 460,472 454,468 C450,464 448,456 452,450 C440,456 428,454 420,445 C415,460 400,468 385,462 C372,458 365,444 368,430 C354,444 334,448 320,438 C306,428 302,410 310,396 C292,408 270,406 258,392 C246,378 248,358 262,348 C242,356 218,350 208,334 C198,318 204,298 220,290 C198,295 178,286 170,268 C162,250 170,228 188,220 C165,222 144,210 138,190 C132,170 142,148 162,140 C140,144 120,132 115,112 C110,92 122,72 142,66 C162,60 185,68 195,86 C200,70 220,58 250,60 Z"/>
  <path d="M162,190 C135,178 105,165 80,145 C60,130 48,110 52,90 C35,108 30,132 42,155 C55,180 82,196 112,200 Z" opacity=".7"/>
  <path d="M338,190 C365,178 395,165 420,145 C440,130 452,110 448,90 C465,108 470,132 458,155 C445,180 418,196 388,200 Z" opacity=".7"/>
  <ellipse cx="225" cy="110" rx="8" ry="6" fill="#ff4400"/>
  <ellipse cx="275" cy="110" rx="8" ry="6" fill="#ff4400"/>
</svg>

<svg class="corner corner-tl" viewBox="0 0 80 80" fill="none"><path d="M5,5 L35,5 L35,8 L8,8 L8,35 L5,35 Z" fill="#cc2200"/><circle cx="5" cy="5" r="3" fill="#e63300"/></svg>
<svg class="corner corner-tr" viewBox="0 0 80 80" fill="none"><path d="M5,5 L35,5 L35,8 L8,8 L8,35 L5,35 Z" fill="#cc2200"/><circle cx="5" cy="5" r="3" fill="#e63300"/></svg>
<svg class="corner corner-bl" viewBox="0 0 80 80" fill="none"><path d="M5,5 L35,5 L35,8 L8,8 L8,35 L5,35 Z" fill="#cc2200"/><circle cx="5" cy="5" r="3" fill="#e63300"/></svg>
<svg class="corner corner-br" viewBox="0 0 80 80" fill="none"><path d="M5,5 L35,5 L35,8 L8,8 L8,35 L5,35 Z" fill="#cc2200"/><circle cx="5" cy="5" r="3" fill="#e63300"/></svg>
<div class="embers" id="embers"></div>

<header>
  <div class="header-ornament">⟨ Rolador de Dados ⟩</div>
  <h1>Dragon <span>Dice</span></h1>
  <div class="header-line"></div>
  <div class="watermark">Feito por CastroCode</div>
</header>

<main>
  <div class="section-title">Escolha o dado</div>
  <div class="dice-grid" id="diceGrid"></div>

  <div class="section-title">Configurar rolagem</div>
  <div class="config-row">
    <div class="config-group">
      <label class="config-label">Quantidade</label>
      <input class="config-input" type="number" id="diceCount" value="1" min="1" max="20">
    </div>
    <div class="config-group">
      <label class="config-label">Modificador</label>
      <input class="config-input" type="number" id="modifier" value="0">
    </div>
    <div class="config-group">
      <label class="config-label">Dado</label>
      <input class="config-input" type="text" id="diceLabel" value="D20" readonly style="cursor:default;color:var(--red3)">
    </div>
  </div>

  <div class="section-title">Modo de resultado</div>
  <div class="mode-row">
    <button class="mode-btn active" id="modeSoma" onclick="setMode('soma')">
      ∑ Somar tudo
      <span class="mode-desc">Soma todos os dados rolados</span>
    </button>
    <button class="mode-btn" id="modeMaior" onclick="setMode('maior')">
      ▲ Maior resultado
      <span class="mode-desc">Pega só o dado mais alto</span>
    </button>
  </div>

  <div class="roll-wrap">
    <button class="roll-btn" id="rollBtn" onclick="doRoll()">⚄ &nbsp; Rolar os Dados &nbsp; ⚄</button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-card">
      <div class="result-formula" id="resultFormula"></div>
      <div class="dice-stage" id="diceStage"></div>
      <div class="result-breakdown" id="resultBreakdown"></div>
      <div class="result-total" id="resultTotal"></div>
      <div class="result-label" id="resultLabel"></div>
    </div>
  </div>

  <div>
    <div class="section-title" style="justify-content:space-between;align-items:center;">
      Histórico
      <button onclick="clearHistory()" style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--text3);background:none;border:none;cursor:pointer;text-transform:uppercase;">Limpar</button>
    </div>
    <div class="hist-list" id="histList"><div class="hist-empty">Nenhuma rolagem ainda...</div></div>
  </div>
</main>

<script>
const DICE = [4,6,8,10,12,20,100];
let selectedDie = 20;
let rollMode = 'soma';
let rollHistory = [];

// SVG shapes for each die — each fits in a 70x70 viewBox
const SHAPES = {
  4:   `<polygon points="35,4 66,62 4,62" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>`,
  6:   `<rect x="5" y="5" width="60" height="60" rx="8" fill="none" stroke="currentColor" stroke-width="3"/>`,
  8:   `<polygon points="35,4 66,35 35,66 4,35" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>`,
  10:  `<polygon points="35,4 64,25 54,60 16,60 6,25" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>`,
  12:  `<polygon points="35,4 58,13 66,37 52,58 18,58 4,37 12,13" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>`,
  20:  `<polygon points="35,4 66,24 60,58 10,58 4,24" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><line x1="4" y1="24" x2="66" y2="24" stroke="currentColor" stroke-width="1.5" opacity=".4"/>`,
  100: `<polygon points="35,4 64,25 54,60 16,60 6,25" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/><text x="35" y="40" text-anchor="middle" font-size="14" font-family="Cinzel,serif" fill="currentColor" stroke="none">%</text>`,
};

// Small icons for selector grid (40x40)
const ICONS = {
  4:   `<polygon points="20,3 37,34 3,34" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>`,
  6:   `<rect x="4" y="4" width="32" height="32" rx="5" fill="none" stroke="currentColor" stroke-width="2.5"/>`,
  8:   `<polygon points="20,2 36,18 20,34 4,18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>`,
  10:  `<polygon points="20,2 36,14 30,32 10,32 4,14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>`,
  12:  `<polygon points="20,2 32,8 36,20 28,32 12,32 4,20 8,8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>`,
  20:  `<polygon points="20,2 36,12 34,30 6,30 4,12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><line x1="4" y1="12" x2="36" y2="12" stroke="currentColor" stroke-width="1" opacity=".35"/>`,
  100: `<polygon points="20,2 36,14 30,32 10,32 4,14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><text x="20" y="22" text-anchor="middle" font-size="8" font-family="Cinzel,serif" fill="currentColor" stroke="none">%</text>`,
};

function buildDiceGrid() {
  const grid = document.getElementById('diceGrid');
  DICE.forEach(d => {
    const lbl = d === 100 ? 'D%' : `D${d}`;
    const btn = document.createElement('button');
    btn.className = 'dice-btn' + (d === selectedDie ? ' selected' : '');
    btn.innerHTML = `<svg class="dice-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">${ICONS[d]}</svg><span class="dice-label">${lbl}</span>`;
    btn.onclick = () => selectDie(d, btn);
    grid.appendChild(btn);
  });
}

function selectDie(d, btn) {
  selectedDie = d;
  document.querySelectorAll('.dice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('diceLabel').value = d === 100 ? 'D%' : `D${d}`;
}

function setMode(m) {
  rollMode = m;
  document.getElementById('modeSoma').classList.toggle('active', m === 'soma');
  document.getElementById('modeMaior').classList.toggle('active', m === 'maior');
}

function rollOne(sides) { return Math.floor(Math.random() * sides) + 1; }

// Build a die element with the correct shape for the selected die
function makeDieEl(sides, value, extraClass) {
  const wrap = document.createElement('div');
  wrap.className = `die-anim ${extraClass}`;
  wrap.innerHTML = `
    <svg class="die-shape" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg" style="color:var(--red3)">
      ${SHAPES[sides]}
    </svg>
    <span class="die-value">${value}</span>`;
  return wrap;
}

function doRoll() {
  const count = Math.min(Math.max(parseInt(document.getElementById('diceCount').value) || 1, 1), 20);
  const mod   = parseInt(document.getElementById('modifier').value) || 0;
  const sides = selectedDie;
  const lbl   = sides === 100 ? 'D%' : `D${sides}`;
  const modeTag = rollMode === 'maior' ? ' (maior)' : '';

  const btn = document.getElementById('rollBtn');
  btn.classList.add('rolling');
  btn.textContent = '🎲 Rolando...';

  document.getElementById('resultArea').classList.add('show');
  document.getElementById('resultFormula').textContent = `${count}${lbl}${mod !== 0 ? (mod>0?'+':'')+mod : ''}${modeTag}`;
  document.getElementById('resultBreakdown').textContent = '';
  document.getElementById('resultTotal').textContent = '...';
  document.getElementById('resultTotal').className = 'result-total';
  document.getElementById('resultLabel').textContent = '';

  // Build spinning dice with correct shape
  const stage = document.getElementById('diceStage');
  stage.innerHTML = '';
  const spinners = [];
  for (let i = 0; i < count; i++) {
    const el = makeDieEl(sides, '?', 'spinning');
    stage.appendChild(el);
    spinners.push(el);
  }

  let step = 0;
  const totalSteps = 14;
  const iv = setInterval(() => {
    spinners.forEach(el => {
      el.querySelector('.die-value').textContent = rollOne(sides);
    });
    step++;
    if (step >= totalSteps) {
      clearInterval(iv);
      const rolls = Array.from({length: count}, () => rollOne(sides));
      showResult(rolls, mod, sides, lbl, count);
      btn.classList.remove('rolling');
      btn.innerHTML = '⚄ &nbsp; Rolar os Dados &nbsp; ⚄';
      spawnEmbers();
    }
  }, 55);
}

function showResult(rolls, mod, sides, lbl, count) {
  const maxVal = Math.max(...rolls);
  const winnerIdx = rolls.indexOf(maxVal);
  let total, breakdown;

  if (rollMode === 'maior') {
    total = maxVal + mod;
    const discards = rolls.filter((_, i) => i !== winnerIdx);
    const modStr = mod !== 0 ? ` ${mod >= 0 ? '+' : ''}${mod}` : '';
    breakdown = `Maior: ${maxVal}${modStr} · Descartados: [${discards.join(', ')}]`;
  } else {
    total = rolls.reduce((a, b) => a + b, 0) + mod;
    const parts = rolls.join(' + ') + (mod !== 0 ? ` ${mod >= 0 ? '+' : ''}${mod}` : '');
    breakdown = count > 1 || mod !== 0 ? `[ ${parts} ]` : '';
  }

  const isCrit   = count === 1 && rolls[0] === sides;
  const isFumble = count === 1 && rolls[0] === 1;

  // Re-render dice with correct shape + landing animation
  const stage = document.getElementById('diceStage');
  stage.innerHTML = '';
  rolls.forEach((r, i) => {
    let cls = '';
    if (rollMode === 'maior') {
      cls = i === winnerIdx ? 'winner' : 'loser';
    } else {
      cls = r === sides ? 'maxroll' : r === 1 ? 'minroll' : '';
    }
    const el = makeDieEl(sides, r, `landing ${cls}`);
    el.style.animationDelay = `${i * 60}ms`;

    // Color the SVG shape to match
    const svg = el.querySelector('.die-shape');
    if (cls === 'winner' || cls === 'maxroll') svg.style.color = 'var(--gold2)';
    else if (cls === 'loser' || cls === 'minroll') svg.style.color = 'var(--text3)';
    else svg.style.color = 'var(--red3)';

    stage.appendChild(el);
  });

  document.getElementById('resultBreakdown').textContent = breakdown;
  const totalEl = document.getElementById('resultTotal');
  totalEl.textContent = total;
  totalEl.className = 'result-total' + (isCrit ? ' critical' : isFumble ? ' fumble' : '');

  const labelEl = document.getElementById('resultLabel');
  if (isCrit)        { labelEl.textContent = '⭐ CRÍTICO! ⭐'; labelEl.className = 'result-label label-crit'; }
  else if (isFumble) { labelEl.textContent = '💀 FUMBLE';     labelEl.className = 'result-label label-fumble'; }
  else               { labelEl.textContent = 'Total da rolagem'; labelEl.className = 'result-label label-normal'; }

  const tag = rollMode === 'maior' ? ' ▲' : ' ∑';
  rollHistory.unshift({ formula:`${count}${lbl}${mod!==0?(mod>0?'+':'')+mod:''}${tag}`, rolls, total, isCrit, isFumble });
  if (rollHistory.length > 40) rollHistory.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('histList');
  if (!rollHistory.length) { list.innerHTML = '<div class="hist-empty">Nenhuma rolagem ainda...</div>'; return; }
  list.innerHTML = rollHistory.map(h => {
    const cls  = h.isCrit ? 'crit' : h.isFumble ? 'fumble' : 'normal';
    const icon = h.isCrit ? '⭐' : h.isFumble ? '💀' : '🎲';
    return `<div class="hist-item">
      <span class="hist-formula">${icon} ${h.formula}</span>
      <span class="hist-rolls">${h.rolls.join(', ')}</span>
      <span class="hist-total ${cls}">${h.total}</span>
    </div>`;
  }).join('');
}

function clearHistory() { rollHistory = []; renderHistory(); }

function spawnEmbers() {
  const container = document.getElementById('embers');
  const btn = document.getElementById('rollBtn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 24; i++) {
    setTimeout(() => {
      const e = document.createElement('div');
      e.className = 'ember';
      const x = cx + (Math.random() - 0.5) * 140;
      const y = cy + (Math.random() - 0.5) * 30;
      const dur = 600 + Math.random() * 800;
      e.style.cssText = `left:${x}px;top:${y}px;animation-duration:${dur}ms;width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;background:${Math.random()>.5?'#ff4400':'#cc2200'};`;
      container.appendChild(e);
      setTimeout(() => e.remove(), dur + 50);
    }, i * 28);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doRoll();
});

buildDiceGrid();
</script>
