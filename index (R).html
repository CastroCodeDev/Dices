<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Dice</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0404;
  --bg2: #110606;
  --surface: #1a0808;
  --surface2: #200a0a;
  --border: #3d1010;
  --border2: #5a1515;
  --red: #cc2200;
  --red2: #e63300;
  --red3: #ff4400;
  --red-glow: rgba(204,34,0,0.3);
  --red-soft: rgba(204,34,0,0.08);
  --gold: #c8960a;
  --gold2: #e8b020;
  --gold-soft: rgba(200,150,10,0.12);
  --text: #f5e6d8;
  --text2: #a07060;
  --text3: #5a3020;
  --ember: #ff6622;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Crimson Pro', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── BACKGROUND TEXTURE ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(204,34,0,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 110%, rgba(180,20,0,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ─── DRAGON SVG WATERMARK ─── */
.dragon-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(700px, 95vw);
  opacity: 0.032;
  pointer-events: none;
  z-index: 0;
  filter: drop-shadow(0 0 40px rgba(204,34,0,0.5));
}

/* ─── HEADER ─── */
header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 40px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.header-ornament {
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--red2);
  text-transform: uppercase;
  font-family: 'Cinzel', serif;
  margin-bottom: 10px;
  opacity: 0.7;
}

h1 {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(32px, 7vw, 64px);
  color: var(--text);
  letter-spacing: 0.05em;
  line-height: 1;
  text-shadow: 0 0 60px rgba(204,34,0,0.4), 0 2px 4px rgba(0,0,0,0.8);
}

h1 span { color: var(--red3); }

.subtitle {
  font-size: 14px;
  color: var(--text2);
  margin-top: 8px;
  letter-spacing: 0.1em;
  font-style: italic;
}

.header-line {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red2), var(--gold), var(--red2), transparent);
  margin: 16px auto 0;
}

/* ─── MAIN LAYOUT ─── */
main {
  position: relative;
  z-index: 10;
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ─── DICE SELECTOR ─── */
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.dice-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 10px;
  margin-bottom: 28px;
}

.dice-btn {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 6px;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--text2);
  font-family: 'Cinzel', serif;
}

.dice-btn:hover {
  border-color: var(--red2);
  background: var(--surface2);
  color: var(--text);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px var(--red-glow);
}

.dice-btn.selected {
  border-color: var(--red3);
  background: var(--red-soft);
  color: var(--red3);
  box-shadow: 0 0 16px var(--red-glow), inset 0 0 16px rgba(204,34,0,0.05);
}

.dice-btn.selected .dice-icon { filter: drop-shadow(0 0 6px var(--red3)); }

.dice-icon {
  width: 36px;
  height: 36px;
}

.dice-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
}

/* ─── CONFIG ROW ─── */
.config-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

@media (max-width: 500px) {
  .config-row { grid-template-columns: 1fr 1fr; }
}

.config-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.config-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text3);
}

.config-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: 'Crimson Pro', serif;
  font-size: 18px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
  text-align: center;
}
.config-input:focus { border-color: var(--red2); box-shadow: 0 0 12px var(--red-glow); }
.config-input::placeholder { color: var(--text3); }

/* ─── ROLL BUTTON ─── */
.roll-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.roll-btn {
  position: relative;
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  background: linear-gradient(135deg, #8b0000, var(--red), #8b0000);
  border: 1px solid var(--red2);
  border-radius: 12px;
  padding: 16px 48px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 30px rgba(204,34,0,0.4), inset 0 1px 0 rgba(255,100,50,0.3);
  overflow: hidden;
}

.roll-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,100,50,0.15) 100%);
}

.roll-btn:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 40px rgba(204,34,0,0.6), inset 0 1px 0 rgba(255,100,50,0.4);
}

.roll-btn:active { transform: scale(0.97); }

.roll-btn.rolling {
  animation: btnPulse 0.12s ease infinite alternate;
  pointer-events: none;
}

@keyframes btnPulse {
  from { box-shadow: 0 4px 20px rgba(204,34,0,0.5); }
  to   { box-shadow: 0 8px 50px rgba(255,80,0,0.9); }
}

/* ─── RESULT AREA ─── */
.result-area {
  margin-bottom: 32px;
  display: none;
}
.result-area.show { display: block; }

.result-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 28px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(204,34,0,0.1), inset 0 1px 0 rgba(255,100,50,0.1);
}

.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red2), var(--gold), var(--red2), transparent);
}

.dice-display {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
  min-height: 64px;
  align-items: center;
}

.single-die {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 58px;
  height: 58px;
  background: var(--surface2);
  border: 2px solid var(--border2);
  border-radius: 10px;
  font-family: 'Cinzel', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--red3);
  text-shadow: 0 0 12px var(--red3);
  box-shadow: 0 0 14px rgba(204,34,0,0.25);
  transition: all 0.3s;
  position: relative;
}

.single-die.max-roll {
  border-color: var(--gold2);
  color: var(--gold2);
  text-shadow: 0 0 16px var(--gold2);
  box-shadow: 0 0 20px rgba(200,150,10,0.4);
  background: var(--gold-soft);
}

.single-die.min-roll {
  border-color: #333;
  color: var(--text3);
  text-shadow: none;
}

.single-die.rolling-die {
  animation: dieShake 0.08s ease infinite alternate;
  border-color: var(--ember);
  color: var(--ember);
}

@keyframes dieShake {
  from { transform: rotate(-8deg) scale(1.05); }
  to   { transform: rotate(8deg) scale(0.97); }
}

.result-formula {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--text3);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.result-breakdown {
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  color: var(--text2);
  margin-bottom: 14px;
  min-height: 24px;
}

.result-total {
  font-family: 'Cinzel', serif;
  font-size: clamp(48px, 12vw, 88px);
  font-weight: 900;
  color: var(--text);
  line-height: 1;
  text-shadow: 0 0 40px rgba(204,34,0,0.5), 0 0 80px rgba(204,34,0,0.2);
  transition: all 0.3s;
}

.result-total.critical {
  color: var(--gold2);
  text-shadow: 0 0 40px rgba(200,150,10,0.7), 0 0 80px rgba(200,150,10,0.3);
  animation: critGlow 1.5s ease-in-out infinite alternate;
}

.result-total.fumble {
  color: var(--text3);
  text-shadow: none;
}

@keyframes critGlow {
  from { text-shadow: 0 0 30px rgba(200,150,10,0.6); }
  to   { text-shadow: 0 0 60px rgba(255,180,0,0.9), 0 0 100px rgba(200,150,10,0.4); }
}

.result-label {
  margin-top: 8px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.label-crit { color: var(--gold2); }
.label-fumble { color: var(--text3); }
.label-normal { color: var(--text3); }

/* ─── EMBERS ─── */
.embers {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 200;
}

.ember {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ember);
  box-shadow: 0 0 6px var(--red3);
  animation: emberFloat linear forwards;
}

@keyframes emberFloat {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-300px) scale(0); opacity: 0; }
}

/* ─── HISTORY ─── */
.history-section { margin-top: 8px; }

.hist-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 280px;
  overflow-y: auto;
}

.hist-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  cursor: pointer;
  transition: all 0.12s;
}
.hist-item:hover { border-color: var(--border2); background: var(--surface2); }

.hist-formula {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  color: var(--text2);
  letter-spacing: 0.05em;
}

.hist-rolls {
  font-family: 'Crimson Pro', serif;
  font-size: 13px;
  color: var(--text3);
  flex: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hist-total {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  min-width: 40px;
  text-align: right;
}
.hist-total.crit { color: var(--gold2); }
.hist-total.fumble { color: var(--text3); }
.hist-total.normal { color: var(--red3); }

.hist-empty {
  text-align: center;
  padding: 20px;
  color: var(--text3);
  font-style: italic;
  font-size: 14px;
}

/* ─── DRAGON ORNAMENT corners ─── */
.corner {
  position: fixed;
  width: 80px;
  height: 80px;
  opacity: 0.18;
  pointer-events: none;
  z-index: 1;
}
.corner-tl { top: 12px; left: 12px; }
.corner-tr { top: 12px; right: 12px; transform: scaleX(-1); }
.corner-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
.corner-br { bottom: 12px; right: 12px; transform: scale(-1,-1); }

@media (max-width: 600px) {
  .corner { display: none; }
  .config-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- Corner ornaments -->

  <path d="M5,5 L35,5 L35,8 L8,8 L8,35 L5,35 Z" fill="#cc2200"/>

</svg>

  <path d="M5,5 L35,5 L35,8 L8,8 L8,35 L5,35 Z" fill="#cc2200"/>

</svg>

  <circle cx="5" cy="5" r="3" fill="#e63300"/>
</svg>

<!-- Embers container -->
<div class="embers" id="embers"></div>

<header>
  <div class="header-ornament">⟨ Rolador de Dados ⟩</div>
  <h1>Dragon <span>Dice</span></h1>
  <div class="subtitle">Que o dragão guie sua sorte</div>
  <div class="header-line"></div>
</header>

<main>

  <!-- DICE SELECTOR -->
  <div class="section-title">Escolha o dado</div>
  <div class="dice-grid" id="diceGrid"></div>

  <!-- CONFIG -->
  <div class="section-title">Configurar rolagem</div>
  <div class="config-row">
    <div class="config-group">
      <label class="config-label">Quantidade</label>
      <input class="config-input" type="number" id="diceCount" value="1" min="1" max="20">
    </div>
    <div class="config-group">
      <label class="config-label">Modificador</label>
      <input class="config-input" type="number" id="modifier" value="0" placeholder="±0">
    </div>
    <div class="config-group">
      <label class="config-label">Dado</label>
      <input class="config-input" type="text" id="diceDisplay" value="D20" readonly style="cursor:default; color:var(--red3);">
    </div>
  </div>

  <!-- ROLL BUTTON -->
  <div class="roll-wrap">
    <button class="roll-btn" id="rollBtn" onclick="doRoll()">
      ⚄ &nbsp; Rolar os Dados &nbsp; ⚄
    </button>
  </div>

  <!-- RESULT -->
  <div class="result-area" id="resultArea">
    <div class="result-card">
      <div class="result-formula" id="resultFormula"></div>
      <div class="dice-display" id="diceDisplay2"></div>
      <div class="result-breakdown" id="resultBreakdown"></div>
      <div class="result-total" id="resultTotal"></div>
      <div class="result-label" id="resultLabel"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-section">
    <div class="section-title" style="justify-content: space-between; align-items: center;">
      Histórico
      <button onclick="clearHistory()" style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;color:var(--text3);background:none;border:none;cursor:pointer;text-transform:uppercase;">Limpar</button>
    </div>
    <div class="hist-list" id="histList">
      <div class="hist-empty">Nenhuma rolagem ainda...</div>
    </div>
  </div>

</main>

<script>
const DICE = [4,6,8,10,12,20,100];
const PERCENTILE = 10; // D10 used as D%
let selectedDie = 20;
let rollHistory = [];

// ── DICE SVG ICONS ──
const diceIcons = {
  4:  `<polygon points="20,2 38,34 2,34" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><line x1="20" y1="2" x2="20" y2="34" stroke="currentColor" stroke-width="1" opacity="0.4"/>`,
  6:  `<rect x="4" y="4" width="32" height="32" rx="5" fill="none" stroke="currentColor" stroke-width="2.5"/>`,
  8:  `<polygon points="20,2 36,18 20,34 4,18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>`,
  10: `<polygon points="20,2 36,14 30,32 10,32 4,14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>`,
  12: `<polygon points="20,2 32,8 36,20 28,32 12,32 4,20 8,8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>`,
  20: `<polygon points="20,2 36,12 34,30 6,30 4,12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><line x1="4" y1="12" x2="36" y2="12" stroke="currentColor" stroke-width="1" opacity="0.35"/>`,
  100:`<polygon points="20,2 36,14 30,32 10,32 4,14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><text x="20" y="22" text-anchor="middle" font-size="8" font-family="Cinzel,serif" fill="currentColor" stroke="none">%</text>`,
};

function buildDiceGrid() {
  const grid = document.getElementById('diceGrid');
  DICE.forEach(d => {
    const label = d === 100 ? 'D%' : `D${d}`;
    const btn = document.createElement('button');
    btn.className = 'dice-btn' + (d === selectedDie ? ' selected' : '');
    btn.innerHTML = `
      <svg class="dice-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        ${diceIcons[d]}
      </svg>
      <span class="dice-label">${label}</span>`;
    btn.onclick = () => selectDie(d, btn);
    grid.appendChild(btn);
  });
}

function selectDie(d, btn) {
  selectedDie = d;
  document.querySelectorAll('.dice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('diceDisplay').value = d === 100 ? 'D%' : `D${d}`;
}

// ── ROLL ──
function rollOne(sides) {
  return Math.floor(Math.random() * sides) + 1;
}

function doRoll() {
  const count = Math.min(Math.max(parseInt(document.getElementById('diceCount').value) || 1, 1), 20);
  const mod = parseInt(document.getElementById('modifier').value) || 0;
  const sides = selectedDie;
  const label = sides === 100 ? 'D%' : `D${sides}`;

  const btn = document.getElementById('rollBtn');
  btn.classList.add('rolling');
  btn.textContent = '🎲 Rolando...';

  // Animate phase
  const display = document.getElementById('diceDisplay2');
  display.innerHTML = Array.from({length: count}, () =>
    `<div class="single-die rolling-die">?</div>`).join('');

  document.getElementById('resultArea').classList.add('show');
  document.getElementById('resultFormula').textContent = `${count}${label}${mod >= 0 ? '+' : ''}${mod !== 0 ? mod : ''}`;
  document.getElementById('resultBreakdown').textContent = '';
  document.getElementById('resultTotal').textContent = '...';
  document.getElementById('resultTotal').className = 'result-total';
  document.getElementById('resultLabel').textContent = '';

  const rolls = [];
  let step = 0;
  const totalSteps = 12;
  const interval = setInterval(() => {
    display.querySelectorAll('.single-die').forEach(el => {
      el.textContent = rollOne(sides);
    });
    step++;
    if (step >= totalSteps) {
      clearInterval(interval);
      // Final result
      for (let i = 0; i < count; i++) rolls.push(rollOne(sides));
      showResult(rolls, mod, sides, label, count);
      btn.classList.remove('rolling');
      btn.innerHTML = '⚄ &nbsp; Rolar os Dados &nbsp; ⚄';
      spawnEmbers();
    }
  }, 55);
}

function showResult(rolls, mod, sides, label, count) {
  const sum = rolls.reduce((a, b) => a + b, 0);
  const total = sum + mod;
  const maxRoll = sides;
  const minRoll = 1;
  const isCrit = count === 1 && rolls[0] === maxRoll;
  const isFumble = count === 1 && rolls[0] === minRoll;

  // Dice display
  const display = document.getElementById('diceDisplay2');
  display.innerHTML = rolls.map(r => {
    const cls = r === maxRoll ? 'single-die max-roll' : r === minRoll ? 'single-die min-roll' : 'single-die';
    return `<div class="${cls}">${r}</div>`;
  }).join('');

  // Breakdown
  const breakdown = rolls.join(' + ') + (mod !== 0 ? ` ${mod >= 0 ? '+' : ''}${mod}` : '');
  document.getElementById('resultBreakdown').textContent = count > 1 || mod !== 0 ? `[ ${breakdown} ]` : '';

  // Total
  const totalEl = document.getElementById('resultTotal');
  totalEl.textContent = total;
  totalEl.className = 'result-total' + (isCrit ? ' critical' : isFumble ? ' fumble' : '');

  // Label
  const labelEl = document.getElementById('resultLabel');
  if (isCrit) { labelEl.textContent = '⭐ CRÍTICO! ⭐'; labelEl.className = 'result-label label-crit'; }
  else if (isFumble) { labelEl.textContent = '💀 FUMBLE'; labelEl.className = 'result-label label-fumble'; }
  else { labelEl.textContent = `Total da rolagem`; labelEl.className = 'result-label label-normal'; }

  // History
  rollHistory.unshift({ formula: `${count}${label}${mod !== 0 ? (mod>0?'+':'')+mod : ''}`, rolls, total, isCrit, isFumble });
  if (rollHistory.length > 40) rollHistory.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('histList');
  if (!rollHistory.length) {
    list.innerHTML = '<div class="hist-empty">Nenhuma rolagem ainda...</div>';
    return;
  }
  list.innerHTML = rollHistory.map((h, i) => {
    const cls = h.isCrit ? 'crit' : h.isFumble ? 'fumble' : 'normal';
    const icon = h.isCrit ? '⭐' : h.isFumble ? '💀' : '🎲';
    return `<div class="hist-item">
      <span class="hist-formula">${icon} ${h.formula}</span>
      <span class="hist-rolls">${h.rolls.join(', ')}</span>
      <span class="hist-total ${cls}">${h.total}</span>
    </div>`;
  }).join('');
}

function clearHistory() {
  rollHistory = [];
  renderHistory();
}

// ── EMBERS ──
function spawnEmbers() {
  const container = document.getElementById('embers');
  const btn = document.getElementById('rollBtn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const e = document.createElement('div');
      e.className = 'ember';
      const x = cx + (Math.random() - 0.5) * 120;
      const y = cy + (Math.random() - 0.5) * 30;
      const dur = 600 + Math.random() * 800;
      e.style.cssText = `left:${x}px; top:${y}px; animation-duration:${dur}ms;
        width:${2+Math.random()*4}px; height:${2+Math.random()*4}px;
        background:${Math.random()>0.5?'#ff4400':'#cc2200'};`;
      container.appendChild(e);
      setTimeout(() => e.remove(), dur + 50);
    }, i * 30);
  }
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.tagName !== 'INPUT') doRoll();
  if (e.key === 'Enter' && document.activeElement.id === 'diceCount') doRoll();
  if (e.key === 'Enter' && document.activeElement.id === 'modifier') doRoll();
});

buildDiceGrid();
</script>
